  <path d="M 15 39 Q 24 15 40 11 Q 56 15 65 39 V 61 H 15 Z" fill="white"/>
  <path d="M 35 61 V 51 A 5 5 0 0 1 45 51 V 61 Z" fill="url(#grad-door)" opacity="0.5"/>
  <rect x="19" y="43" width="11" height="9" rx="2.5" fill="url(#grad-door)" opacity="0.4"/>
  <rect x="50" y="43" width="11" height="9" rx="2.5" fill="url(#grad-door)" opacity="0.4"/>
  <path d="M 15 68 Q 27.5 62 40 68 Q 52.5 74 65 68"
