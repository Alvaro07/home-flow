      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#48cfad"/>
    </linearGradient>
    <linearGradient id="grad-door" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5248d4"/>
      <stop offset="100%" stop-color="#35a889"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="90" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
